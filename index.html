<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Top Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f0f0f, #000);
  color: #fff;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
}

header img {
  height: 50px;
}

/* BOTÃO */
.btn {
  background: linear-gradient(45deg, #00ff88, #00c3ff);
  color: #000;
  padding: 12px 20px;
  border-radius: 6px;
  font-weight: bold;
  text-decoration: none;
}

/* HERO */
.hero {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  padding: 40px 20px;
  gap: 30px;
}

.hero-text {
  flex: 1;
}

.hero-text h1 {
  font-size: 34px;
  color: #00ff88;
}

.hero-text p {
  margin: 15px 0;
  opacity: 0.8;
}

.hero-img {
  flex: 1;
  text-align: center;
}

.hero-img img {
  width: 100%;
  max-width: 350px;
  border-radius: 12px;
  box-shadow: 0 0 30px rgba(0,255,136,0.4);
}

/* SEÇÃO */
.section {
  padding: 50px 20px;
}

.section h2 {
  color: #00ff88;
  margin-bottom: 20px;
  text-align: center;
}

/* GALERIA PREMIUM */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  aspect-ratio: 9/16;
}

.card img,
.card video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CTA */
.cta {
  text-align: center;
  padding: 60px 20px;
  background: #111;
}

.cta h2 {
  color: #00ff88;
  margin-bottom: 10px;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.5;
}

/* MOBILE */
@media (max-width: 768px) {

  .hero {
    flex-direction: column;
    text-align: center;
  }

  .hero-text h1 {
    font-size: 26px;
  }

  .btn {
    display: inline-block;
    margin-top: 10px;
  }

}

</style>
</head>

<body>

<header>
  <img src="images/logo.jpeg">
  <a class="btn" href="https://wa.me/55SEUNUMERO" target="_blank">WhatsApp</a>
</header>

<section class="hero">

  <div class="hero-text">
    <h1>Mais retenção. Mais tempo de jogo. Mais faturamento.</h1>
    <p>
      Sistema com jackpots progressivos que mantém o jogador ativo por mais tempo.
    </p>

    <a class="btn" href="https://wa.me/55SEUNUMERO" target="_blank">
      Solicitar demonstração
    </a>
  </div>

  <div class="hero-img">
    <img src="images/frente.jpeg">
  </div>

</section>

<section class="section">
  <h2>Em operação</h2>

  <div class="gallery">

    <div class="card">
      <img src="images/maq1.jpeg">
    </div>

    <div class="card">
      <img src="images/maq2.jpeg">
    </div>

    <div class="card">
      <video controls>
        <source src="images/maq3.mp4" type="video/mp4">
      </video>
    </div>

  </div>
</section>

<section class="cta">
  <h2>Veja na prática</h2>
  <p>Fale agora e solicite uma demonstração</p>

  <a class="btn" href="https://wa.me/55SEUNUMERO" target="_blank">
    Falar no WhatsApp
  </a>
</section>

<div class="footer">
  Top Game © 2026
</div>

</body>
</html>
