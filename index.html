<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Top Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: Arial, sans-serif;
  color: #fff;
  background: radial-gradient(circle at 20% 20%, rgba(255,0,120,0.15), transparent 40%),
              radial-gradient(circle at 80% 30%, rgba(0,200,255,0.15), transparent 40%),
              radial-gradient(circle at 50% 80%, rgba(255,200,0,0.15), transparent 40%),
              #000;
  overflow-x: hidden;
}

/* FUNDO ANIMADO */
.neon-bg::before {
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background: linear-gradient(45deg,
    transparent,
    rgba(255,0,100,0.1),
    transparent,
    rgba(0,255,200,0.1),
    transparent,
    rgba(255,200,0,0.1)
  );
  animation: rotate 15s linear infinite;
  z-index:-1;
}

@keyframes rotate {
  0% {transform:rotate(0deg);}
  100% {transform:rotate(360deg);}
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

header img {height:55px;}

.btn {
  background: linear-gradient(45deg,#00ff88,#00c3ff);
  color:#000;
  padding:12px 20px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero {
  padding:60px 20px;
  text-align:center;
}

.hero h1 {
  font-size:34px;
  background: linear-gradient(45deg,#00ff88,#00c3ff,#ff00aa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p {
  margin:15px 0;
  opacity:0.9;
}

/* JACKPOT */
.jackpot {
  font-size:40px;
  color:#00ff88;
  text-shadow:0 0 20px #00ff88;
  margin-top:20px;
  animation:pulse 1s infinite;
}

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* VIDEO */
.video {
  text-align:center;
  padding:30px;
}

.video video {
  width:90%;
  max-width:400px;
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,255,136,0.3);
}

/* GALERIA */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  padding:20px;
}

.gallery img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover {
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}

/* FOOTER COM OVERLAY */
.footer {
  position:relative;
  height:300px;
  background:url("images/frente.jpeg") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
}

.footer::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
}

.footer-content {
  position:relative;
  z-index:2;
  text-align:center;
}

.footer-content h2 {
  color:#00ff88;
}

.footer-bottom {
  text-align:center;
  padding:20px;
  opacity:0.5;
}

/* WHATSAPP FIXO */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00ff88;
  color:#000;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  .hero h1 {font-size:26px;}
}

</style>
</head>

<body class="neon-bg">

<header>
  <img src="images/Logo.jpeg">
  <a class="btn" href="https://wa.me/55SEUNUMERO">WhatsApp</a>
</header>

<section class="hero">
  <h1>Mais retenção. Mais tempo de jogo. Mais faturamento.</h1>
  <p>Jogos com jackpots progressivos que mantêm o jogador ativo.</p>

  <div class="jackpot" id="jackpot">R$ 1.200</div>

  <br>

  <a class="btn" href="https://wa.me/55SEUNUMERO">
    Solicitar demonstração
  </a>
</section>

<section class="video">
  <video controls>
    <source src="images/maq3.mp4" type="video/mp4">
  </video>
</section>

<section class="gallery">
  <img src="images/maq1.jpeg" onclick="openImg(this.src)">
  <img src="images/maq2.jpeg" onclick="openImg(this.src)">
  <img src="images/frente.jpeg" onclick="openImg(this.src)">
</section>

<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="lightbox-img">
</div>

<div class="footer">
  <div class="footer-content">
    <h2>Veja na prática</h2>
    <p>Fale agora e solicite uma demonstração</p>
    <br>
    <a class="btn" href="https://wa.me/55SEUNUMERO">
      Falar no WhatsApp
    </a>
  </div>
</div>

<div class="footer-bottom">
  Top Game © 2026
</div>

<a class="whatsapp" href="https://wa.me/55SEUNUMERO">💬</a>

<script>

/* JACKPOT ANIMADO */
let value = 1200;
setInterval(()=>{
  value += Math.floor(Math.random()*8);
  document.getElementById("jackpot").innerText = "R$ " + value;
},150);

/* LIGHTBOX */
function openImg(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}

function closeImg(){
  document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
