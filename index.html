<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Top Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: #fff;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

header img {height:50px;}

.btn {
  background:#00ff88;
  color:#000;
  padding:10px 18px;
  border-radius:5px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero {
  padding:40px 20px;
  text-align:center;
}

.hero h1 {
  color:#00ff88;
  font-size:30px;
}

.hero p {margin:15px 0;}

/* JACKPOT */
.jackpot {
  font-size:36px;
  color:#00ff88;
  text-shadow:0 0 20px #00ff88;
  margin-top:20px;
}

/* GALERIA */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  padding:20px;
}

.gallery img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover {
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}

/* VIDEO */
.video {
  padding:20px;
  text-align:center;
}

.video video {
  width:90%;
  max-width:400px;
  border-radius:10px;
}

/* CTA */
.cta {
  text-align:center;
  padding:40px;
}

.cta h2 {color:#00ff88;}

.footer {
  text-align:center;
  padding:20px;
  opacity:0.5;
}

</style>
</head>

<body>

<header>
  <img src="images/Logo.jpeg">
  <a class="btn" href="https://wa.me/55SEUNUMERO">WhatsApp</a>
</header>

<section class="hero">
  <h1>Mais retenção. Mais faturamento.</h1>
  <p>Jogos com jackpots progressivos que mantêm o jogador ativo.</p>

  <div class="jackpot" id="jackpot">R$ 1.200</div>
</section>

<section class="video">
  <video controls>
    <source src="images/maq3.mp4" type="video/mp4">
  </video>
</section>

<section class="gallery">
  <img src="images/maq1.jpeg" onclick="openImg(this.src)">
  <img src="images/maq2.jpeg" onclick="openImg(this.src)">
  <img src="images/frente.jpeg" onclick="openImg(this.src)">
</section>

<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="lightbox-img">
</div>

<section class="cta">
  <h2>Veja na prática</h2>
  <p>Fale agora e solicite uma demonstração</p>
  <a class="btn" href="https://wa.me/55SEUNUMERO">Falar no WhatsApp</a>
</section>

<div class="footer">Top Game © 2026</div>

<script>

/* JACKPOT */
let value = 1200;
setInterval(() => {
  value += Math.floor(Math.random()*5);
  document.getElementById("jackpot").innerText = "R$ " + value;
}, 200);

/* LIGHTBOX */
function openImg(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}

function closeImg(){
  document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
