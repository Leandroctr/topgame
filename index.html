<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Top Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: Arial, sans-serif;
  color: #fff;
  background: radial-gradient(circle at 20% 20%, rgba(255,0,120,0.15), transparent 40%),
              radial-gradient(circle at 80% 30%, rgba(0,200,255,0.15), transparent 40%),
              radial-gradient(circle at 50% 80%, rgba(255,200,0,0.15), transparent 40%),
              #000;
}

/* HEADER */
header {
  display:flex;
  justify-content:flex-end;
  padding:20px;
}

.btn {
  background: linear-gradient(45deg,#00ff88,#00c3ff);
  color:#000;
  padding:12px 20px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO LOGO */
.hero {
  height: 70vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img {
  width: 90%;
  max-width: 800px;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 0 25px rgba(0,255,136,0.6));
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

.hero p {
  margin-top: 20px;
  font-size: 18px;
  opacity: 0.8;
}

/* JACKPOT */
.jackpot {
  font-size:40px;
  color:#00ff88;
  text-shadow:0 0 20px #00ff88;
  margin-top:20px;
}

/* VIDEO */
.video {
  text-align:center;
  padding:40px 20px;
}

.video video {
  width:90%;
  max-width:400px;
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,255,136,0.3);
}

/* GALERIA */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  padding:20px;
}

.gallery img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover {
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}

/* CTA FINAL */
.cta {
  text-align:center;
  padding:60px 20px;
}

.cta h2 {
  color:#00ff88;
}

/* FOOTER LIMPO */
.footer {
  text-align:center;
  padding:20px;
  opacity:0.5;
}

/* WHATSAPP FIXO */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00ff88;
  color:#000;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  .hero img {
    max-width: 90%;
  }
}

</style>
</head>

<body>

<header>
  <a class="btn" href="https://wa.me/55SEUNUMERO">WhatsApp</a>
</header>

<section class="hero">
  <img src="images/Logo.jpeg">
  <p>Máquinas com jackpots progressivos que aumentam o tempo de jogo</p>

  <div class="jackpot" id="jackpot">R$ 1.200</div>
</section>

<section class="video">
  <video controls>
    <source src="images/maq3.mp4" type="video/mp4">
  </video>
</section>

<section class="gallery">
  <img src="images/maq1.jpeg" onclick="openImg(this.src)">
  <img src="images/maq2.jpeg" onclick="openImg(this.src)">
  <img src="images/frente.jpeg" onclick="openImg(this.src)">
</section>

<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="lightbox-img">
</div>

<section class="cta">
  <h2>Veja na prática</h2>
  <p>Solicite uma demonstração agora</p>
  <br>
  <a class="btn" href="https://wa.me/55SEUNUMERO">
    Falar no WhatsApp
  </a>
</section>

<div class="footer">
  Top Game © 2026
</div>

<a class="whatsapp" href="https://wa.me/55SEUNUMERO">💬</a>

<script>

/* JACKPOT */
let value = 1200;
setInterval(()=>{
  value += Math.floor(Math.random()*6);
  document.getElementById("jackpot").innerText = "R$ " + value;
},150);

/* LIGHTBOX */
function openImg(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}

function closeImg(){
  document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
